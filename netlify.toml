# Netlify 설정 파일

[build]
  # 빌드 명령 없음 (정적 사이트)
  publish = "."

# 게시물별 동적 렌더링(Dynamic Rendering)
# netlify/edge-functions/render-post.js 가 "/post/*" 요청을 처리합니다.
#   - 사람 -> SPA(index.html) 그대로 통과
#   - 봇/크롤러(카카오톡/페북/트위터/구글/네이버 등) -> 게시물별 SEO/OG HTML 즉시 렌더
# 경로 매칭은 해당 파일의 `export const config = { path: "/post/*" }` 로 자동 등록됩니다.

# Netlify Prerender Extension을 위한 설정
# Extension이 빌드 시 생성된 sitemap.xml을 자동으로 감지하여 프리렌더링합니다

# 동적 sitemap을 위한 redirect 설정 (가장 먼저 매칭)
[[redirects]]
  from = "/sitemap.xml"
  to = "/.netlify/functions/sitemap"
  status = 200
  force = true

# SPA 라우팅을 위한 설정 (기존 _redirects와 동일)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# 헤더 설정 - 캐싱 최적화
[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# 정적 리소스 캐싱
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.svg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
